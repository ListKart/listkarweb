<!DOCTYPE html>
<html lang="fi">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title data-i18n="404_page_title">
   ListKart
  </title>
  <style>
   body {
            font-family: -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f8f9fa;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #111;
        }

        p {
            color: #666;
            margin-bottom: 1.5rem;
        }

        a {
            background: #19983a;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
        }
  </style>
  <script>
   // Handle /join/CODE deep links
        (function () {
            var path = window.location.pathname;
            if (path.indexOf('/join/') === 0) {
                var code = path.replace('/join/', '').replace(/\/$/, '');
                if (code && code.length > 0) {
                    // Redirect to join page with code as query param
                    window.location.replace('/join?code=' + encodeURIComponent(code));
                } else {
                    window.location.replace('/join');
                }
            }
        })();
  </script>
 </head>
 <body>
  <div class="card">
   <h1 data-i18n="404_h1_0">
    Redirecting...
   </h1>
   <p data-i18n="404_p_0">
    If you are not redirected automatically,
    <a data-i18n="404_a_0" href="..//">
     go home
    </a>
    .
   </p>
  </div>
 </body>
</html>
